# MindWall — Docker Compose Production Configuration
# Developed by Pradyumn Tandon (https://pradyumntandon.com) at VRIP7 (https://vrip7.com)
# Usage: docker compose up -d --build

services:

  # ── Ollama LLM Server ──────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: mindwall-ollama
    restart: always
    volumes:
      - ./data/models:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_FLASH_ATTENTION=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - mindwall-internal
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── FastAPI Core Engine ────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: mindwall-api
    restart: always
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./data/db:/srv/app/data/db
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen3:8b
      - DATABASE_URL=sqlite+aiosqlite:////srv/app/data/db/mindwall.db
      - API_SECRET_KEY=${API_SECRET_KEY}
      - DASHBOARD_USERNAME=${DASHBOARD_USERNAME}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
      - LOG_LEVEL=INFO
      - WORKERS=4
    ports:
      - "5297:5297"
    networks:
      - mindwall-internal
      - mindwall-host
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5297/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── IMAP/SMTP Proxy ───────────────────────────────────────────────────
  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: mindwall-proxy
    restart: always
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_BASE_URL=http://api:5297
      - API_SECRET_KEY=${API_SECRET_KEY}
      - IMAP_LISTEN_HOST=0.0.0.0
      - IMAP_LISTEN_PORT=1143
      - SMTP_LISTEN_HOST=0.0.0.0
      - SMTP_LISTEN_PORT=1025
      - LOG_LEVEL=INFO
    ports:
      - "1143:1143"       # IMAP — email clients connect here
      - "1025:1025"       # SMTP — outbound monitoring
    networks:
      - mindwall-internal
      - mindwall-host

  # ── React Dashboard ───────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: mindwall-ui
    restart: always
    depends_on:
      - api
    environment:
      - VITE_API_BASE_URL=http://localhost:5297
      - VITE_WS_URL=ws://localhost:5297/ws/alerts
    ports:
      - "4297:4297"
    networks:
      - mindwall-host

networks:
  mindwall-internal:
    driver: bridge
    internal: true          # Ollama + API cannot reach internet directly
  mindwall-host:
    driver: bridge
