# MindWall — Docker Compose Development Override
# Developed by Pradyumn Tandon (https://pradyumntandon.com) at VRIP7 (https://vrip7.com)
# Usage: docker compose -f docker-compose.yml -f docker-compose.override.yml up
services:

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    volumes:
      - ./api:/srv/app                # Hot-reload source code
      - ./data/db:/srv/app/data/db
    environment:
      - LOG_LEVEL=DEBUG
      - WORKERS=1                   # Single worker for debugging
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 5297
      --reload
      --reload-dir /srv/app
      --log-level debug

  proxy:
    volumes:
      - ./proxy:/app                # Hot-reload proxy source
    environment:
      - LOG_LEVEL=DEBUG

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    volumes:
      - ./dashboard:/app
      - /app/node_modules           # Anonymous volume for node_modules
    ports:
      - "4297:4297"                 # Vite dev server port
    environment:
      - VITE_API_BASE_URL=http://localhost:5297
      - VITE_WS_URL=ws://localhost:5297/ws/alerts
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]
